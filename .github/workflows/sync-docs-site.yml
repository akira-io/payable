name: Deploy docs site

on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set" >&2
            exit 1
          fi
          curl -fsS -o /dev/null -X POST "$DEPLOY_HOOK"
          echo "docs site rebuild triggered"

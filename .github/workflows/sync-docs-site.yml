name: Deploy docs site

on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout payable
        uses: actions/checkout@v4

      - name: Checkout payable-docs
        uses: actions/checkout@v4
        with:
          repository: kidiatoliny/payable-docs
          token: ${{ secrets.PAYABLE_DOCS_TOKEN }}
          path: payable-docs

      - name: Mirror docs into _docs_src
        run: rsync -a --delete docs/ payable-docs/_docs_src/

      - name: Commit and push
        working-directory: payable-docs
        run: |
          git config user.name "kidiatoliny"
          git config user.email "48266788+kidiatoliny@users.noreply.github.com"
          git add _docs_src
          if git diff --cached --quiet; then
            echo "no docs changes to publish"
            exit 0
          fi
          git commit -m "docs: sync from payable ${GITHUB_SHA::7}"
          git push
